name: Deploy site

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" > ~/.ssh/known_hosts

      - name: Upload dist
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          set -eu
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST variable}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER variable}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH variable}"
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          REMOTE_TMP="~/website-deploy-tmp"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "rm -rf $REMOTE_TMP && mkdir -p $REMOTE_TMP"
          rsync -az --delete -e "ssh -p $DEPLOY_PORT" dist/ "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_TMP/"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "sudo mkdir -p '$DEPLOY_PATH' && sudo rsync -az --delete $REMOTE_TMP/ '$DEPLOY_PATH/' && sudo chown -R www-data:www-data '$DEPLOY_PATH' && rm -rf $REMOTE_TMP"
